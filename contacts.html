<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти — NexusApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

    <header class="sticky-top bg-dark border-bottom border-secondary py-3">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">NexusApp</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contacts.html">Контакти</a></li>
                        <li class="nav-item ms-lg-3"><a class="btn btn-primary px-4 w-100" href="#">Завантажити</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 py-4">
        <div class="container">
            <h1 class="mb-4 text-center text-lg-start">Зв'яжіться з нами</h1>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="bg-secondary bg-opacity-25 p-4 rounded-4 border border-secondary mb-4">
                        <p class="mb-2"><span class="text-secondary small">ПОШТА:</span><br>support@nexus.com</p>
                        <p class="mb-0"><span class="text-secondary small">ТЕЛЕФОН:</span><br>
                            <a href="tel:+380501234567" class="text-white fw-bold text-decoration-none fs-5">+38 (050) 123-45-67</a>
                        </p>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="bg-secondary bg-opacity-25 p-4 rounded-4 shadow">
                        <form action="#" method="POST"> 
                            <div class="mb-3">
                                <label class="form-label text-secondary small">Ваше ім'я</label>
                                <input type="text" name="name" class="form-control bg-dark text-white border-secondary" autocomplete="name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary small">Ваш Email</label>
                                <input type="email" name="email" class="form-control bg-dark text-white border-secondary" autocomplete="email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary small">Повідомлення</label>
                                <textarea name="message" class="form-control bg-dark text-white border-secondary" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3">Відправити</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 border-top border-secondary mt-auto text-center">
        <div class="container"><p class="text-secondary small mb-0">&copy; 2026 NexusApp.</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
