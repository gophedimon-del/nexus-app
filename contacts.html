<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти — NexusApp</title>
    <meta name="description" content="Зв'яжіться з командою підтримки NexusApp через форму зворотного зв'язку.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">NexusApp</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contacts.html">Контакти</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 py-5">
        <div class="container">
            <h1 class="mb-5">Зв'яжіться з нами</h1> <div class="row g-5">
                <div class="col-lg-5">
                    <h2 class="h4 mb-4 text-primary">Наші контакти</h2> <p class="mb-2"><span class="text-secondary">ПОШТА:</span><br>support@nexusapp.com.ua</p>
                    <p class="mb-4"><span class="text-secondary">ОФІС:</span><br>м. Одеса, вул. Інноваційна, 12</p>
                    <div class="bg-card rounded-3 p-5 text-center border border-secondary border-opacity-25">
                        <p class="text-secondary mb-0">Тут буде Google Карта</p>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="bg-card p-4 p-md-5 rounded-4 shadow">
                        <h2 class="h4 mb-4">Напишіть нам</h2>
                        <form action="#" method="POST"> 
                            <div class="mb-3">
                                <label class="form-label text-secondary small">Ваше ім'я</label>
                                <input type="text" name="name" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary small">Ваш Email</label>
                                <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary small">Повідомлення</label>
                                <textarea name="message" class="form-control bg-dark text-white border-secondary" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary px-5 py-2">Відправити</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 border-top border-secondary mt-auto text-center">
        <p class="text-secondary small mb-0">&copy; 2026 NexusApp. Всі права захищені.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
